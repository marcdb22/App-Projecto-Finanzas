<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Categorías</title>
  <script>
    if (localStorage.getItem('isLoggedIn') !== 'true') {
      window.location.replace('log_in/index.html');
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h1 style="margin: 0; color: #512da8;">Tus Finanzas</h1>
      <button id="btnCerrarSesion" class="logout-btn">Cerrar Sesión</button>
    </div>

    <!-- Formulario para crear una nueva categoría -->
    <div class="form-card">
      <h2>Añadir Categoría</h2>
      <form id="categoriaForm">
        <label for="nombre">Nombre de la Categoría</label>
        <input type="text" id="nombre" placeholder="Ej. Comida, Ocio..." required>

        <label for="limite">Límite Mensual (%)</label>
        <input type="number" id="limite" placeholder="Ej. 25" min="1" max="100" required>

        <button type="submit">Guardar Categoría</button>
      </form>
    </div>

    <!-- Lista de categorías existentes -->
    <div class="list-card">
      <h2>Tus Categorías</h2>
      <ul id="listaCategorias">
        <!-- Las categorías se cargarán aquí desde JS -->
      </ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
